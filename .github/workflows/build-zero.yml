name: Yocto Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gawk wget git diffstat unzip texinfo gcc build-essential chrpath socat cpio python3 python3-pip python3-pexpect xz-utils debianutils iputils-ping python3-git python3-jinja2 libegl1-mesa libsdl1.2-dev python3-subunit mesa-common-dev zstd liblz4-tool file locales bmap-tools
          sudo locale-gen en_US.UTF-8

      - name: Clone Yocto layers
        run: |
          git clone -b kirkstone git://git.yoctoproject.org/meta-raspberrypi
          git clone -b kirkstone git://git.yoctoproject.org/poky
          git clone -b kirkstone git://git.openembedded.org/meta-openembedded
          git clone -b kirkstone https://github.com/rauc/meta-rauc.git
          git clone -b kirkstone https://github.com/rauc/meta-rauc-community.git

      - name: Initialize Yocto build environment
        run: |
          TEMPLATECONF=$(readlink -f ./meta-scsat1-rpi/conf) source ./poky/oe-init-build-env

      - name: Build Yocto image
        run: |
          bitbake core-image-minimal

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: yocto-image
          path: build/tmp/deploy/images/
